syntax = "proto3";

option java_package = "org.example";
option java_multiple_files = true;

import "google/protobuf/empty.proto";

service CarritoService{
  
  rpc obtenerCatalogo (google.protobuf.Empty) returns (CatalogoResponse);
  rpc procesarCarrito (CarritoRequest) returns (CarritoResponse);
}

message Producto{
  string id = 1;
  string nombre = 2;
  double precio = 3;
  int32 cantidad = 4;
}

message CatalogoResponse{
  repeated Producto productos = 1;
}

message CarritoRequest{
  string usuario_id = 1;
  repeated Producto items = 2;
}

message CarritoResponse{
  string transaccion_id = 1;
  double total_neto = 2;
  double impuestos = 3;
  double total_pagar = 4;
  string estado = 5;
}